# TODO: Deploy infra — runs on changes to /infra
# On PR:   cdk diff → post output as PR comment
# On main: cdk deploy
name: Deploy Infrastructure

on:
  pull_request:
    paths: ['infra/**']
  push:
    branches: [main]
    paths: ['infra/**']

jobs:
  cdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # TODO: Add AWS credentials, cdk diff/deploy steps
