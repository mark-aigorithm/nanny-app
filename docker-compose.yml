services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: nannyapp-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nannyapp
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
